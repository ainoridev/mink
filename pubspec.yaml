name: mink
description: Mink Flutter application.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.2.0
  riverpod_annotation: ^4.0.2
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/env/.env
    - assets/env/.env.example
